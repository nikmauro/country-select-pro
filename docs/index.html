<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CountrySelect Pro - Live Demo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .demo-card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 30px; margin-bottom: 30px; }
        h1 { font-weight: 800; color: #333; margin-bottom: 30px; }
        .section-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 15px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center">
        <h1>CountrySelect Pro 🌍</h1>
        <p class="lead">Το πιο ελαφρύ και έξυπνο Country Picker για Vanilla JS & Bootstrap.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            
            <form action="#" method="GET">
                
                <div class="demo-card">
                    <div class="section-title">Phone Prefix + Bootstrap Input Group</div>
                    <div class="input-group mb-3">
                        <div class="input-group-text">
                            <input type="text" 
                                   class="country-select" 
                                   name="prefix" 
                                   value="+30" 
                                   data-value-type="phone"
                                   data-schema-return="{img} {phone}"
                                   data-dropdown-width="300px"
                                   required>
                        </div>
                        <input type="text" class="form-control" placeholder="6912345678" required>
                    </div>
                </div>

                <div class="demo-card">
                    <div class="section-title">Full Country Selection (ISO Value)</div>
                    <div class="mb-3">
                        <input type="text" 
                               class="country-select" 
                               name="country" 
                               data-placeholder="Επιλέξτε Χώρα"
                               data-schema="{img} {name} ({code})"
                               required>
                    </div>
                </div>

                <div class="demo-card">
                    <div class="section-title">Preferred (GR, CY) & Custom Return Schema</div>
                    <div class="mb-3">
                        <input type="text" 
                               class="country-select" 
                               value="CY"
                               data-preferred="GR,CY"
                               data-schema-return="Επιλέχθηκε: {img} {name}"
                               data-country-row-values="8">
                    </div>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary btn-lg px-5">Υποβολή Φόρμας</button>
                </div>

            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/nikmauro/country-select-pro@main/country-select.min.js"></script>

</body>
</html>
